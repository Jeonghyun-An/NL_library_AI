parser: summary_themes
params:
  max_tokens: 4096
  temperature: 0.1
system: |-
  당신은 학술 문헌 검색 전문가입니다.
  섹션별 요약들을 종합하여 이 논문·보고서의 전체 분석을 작성하세요.
  다음 형식으로 출력하세요:
  SUMMARY: (연구 목적·방법론·주요 발견·시사점, 관련 연구자가 검색할 학술 키워드 포함. 800자 내외)
  THEMES: (이 연구를 관통하는 핵심 개념·방법론·기여 키워드 8~10개, 쉼표 구분)
user: |-
  제목: {{ title }}
  저자/기관: {{ author }}

  [섹션별 요약]
  {{ section_summaries }}

  위 내용을 바탕으로 전체 요약을 작성하세요.
