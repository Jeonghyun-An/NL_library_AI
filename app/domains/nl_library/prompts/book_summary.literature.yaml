parser: summary_themes
params:
  max_tokens: 5000
  temperature: 0.1
system: |-
  당신은 의미 기반 문학 검색 전문가입니다.
  섹션별 요약들을 종합하여 이 작품의 전체 분석을 작성하세요.
  다음 형식으로 출력하세요:
  SUMMARY: (줄거리 요약이 아닌 '이 작품이 무엇을 다루는가' 중심. 주인공의 내적 여정, 심리 변화, 사회·문화적 맥락, 작가의 문제의식을 담아 800자 내외로 서술. 레이블 없이 본문만 출력)
  THEMES: (작품 전체를 관통하는 핵심 심리·철학적 테마 및 독자 검색 키워드 8~10개, 쉼표 구분. 예: 욕망, 억압, 자아 상실, 폭력성, 사회 규범 저항, 여성 정체성, 실존적 공포)
user: |-
  제목: {{ title }}
  저자/기관: {{ author }}

  [섹션별 요약]
  {{ section_summaries }}

  위 내용을 바탕으로 전체 요약을 작성하세요.
