version: "3.9"

x-nl-lib-net: &nl-lib-net
  networks:
    - nl-lib-net

x-common-env: &common-env
  IS_DOCKER: "true"
  PYTHONUNBUFFERED: "1"

  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-nl_lib}
  DB_USER: ${POSTGRES_USER:-admin}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-password}

  REDIS_URL: "redis://redis:6379/0"

  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_SECURE: "false"
  MINIO_BUCKET: "nl-lib-bucket"

  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION: "nl_lib_embeddings"

  VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:18080/v1}
  VLLM_MODEL: ${VLLM_SERVED_NAME:-LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct}

  EMBEDDING_MODEL_NAME: "BAAI/bge-m3"
  EMBEDDING_BATCH_SIZE: "32"
  EMBEDDING_DIM: "1024"

services:
  # ── 인프라 ──────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: nl-lib-etcd
    environment:
      ETCD_DATA_DIR: "/etcd"
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd:2380"
      ETCD_INITIAL_CLUSTER: "default=http://etcd:2380"
      ETCD_NAME: "default"
      ETCDCTL_API: "3"
    volumes:
      - nl_lib_etcd_data:/etcd
    <<: *nl-lib-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: nl-lib-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - nl_lib_minio_data:/data
    ports:
      - "21000:9000"
      - "21001:9001"
    <<: *nl-lib-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: nl-lib-minio-init
    <<: *nl-lib-net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: "nl-lib-bucket"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set myminio http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
          echo "waiting for minio..." && sleep 3
        done
        mc mb -p myminio/"$MINIO_BUCKET" || true
        echo "[minio-init] bucket ready: $MINIO_BUCKET"
    restart: "no"

  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: nl-lib-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "nl-lib-bucket"
    volumes:
      - nl_lib_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    <<: *nl-lib-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nl-lib-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nl_lib}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "15432:5432"
    volumes:
      - nl_lib_postgres_data:/var/lib/postgresql/data
    <<: *nl-lib-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-nl_lib}",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nl-lib-redis
    ports:
      - "16379:6379"
    volumes:
      - nl_lib_redis_data:/data
    <<: *nl-lib-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── 애플리케이션 ────────────────────────────────────
  fastapi:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: nl-lib-fastapi
    <<: *nl-lib-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
    volumes:
      - /data/models/.hf-cache:/models:rw
      - ./app:/app:rw
    ports:
      - "18002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  celery_worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: nl-lib-celery
    <<: *nl-lib-net
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q ingestion,default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
    volumes:
      - /data/models/.hf-cache:/models:rw
      - ./app:/app:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nl-lib-nuxt
    <<: *nl-lib-net
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: nl-lib-gateway
    <<: *nl-lib-net
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "93:80"
    depends_on:
      nuxt:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nl_lib_etcd_data:
    external: true
    name: nl_lib_etcd_data
  nl_lib_milvus_data:
    external: true
    name: nl_lib_milvus_data
  nl_lib_minio_data:
    external: true
    name: nl_lib_minio_data
  nl_lib_postgres_data:
    external: true
    name: nl_lib_postgres_data
  nl_lib_redis_data:
    external: true
    name: nl_lib_redis_data

networks:
  nl-lib-net:
    external: true
    name: nl-lib-net
