# 개발 스택 전용 게이트웨이 설정 (docker-compose.dev.yml의 gateway-dev가 마운트)
# 운영 conf.d/default.conf와 라우팅 규칙은 동일하고, upstream만 -dev 컨테이너로 교체.
upstream fastapi {
    server nl-lib-dev-fastapi:8000;
}

upstream nuxt {
    server nl-lib-dev-nuxt:3000;
}

server {
    listen 80;
    server_name _;

    # 헬스체크
    location /health {
        proxy_pass http://fastapi/health;
    }

    # FastAPI (REST API)
    location /api/ {
        proxy_pass         http://fastapi;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Nuxt (프론트엔드) — 나머지 전부
    location / {
        proxy_pass         http://nuxt;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

        # Nuxt HMR (개발 시 WebSocket) — 개발 스택은 실제 dev 서버라 필수
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
