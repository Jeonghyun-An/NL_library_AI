version: "3.9"

x-nl-lib-net: &nl-lib-net
  networks:
    - nl-lib-net

x-common-env: &common-env
  IS_DOCKER: "true"
  PYTHONUNBUFFERED: "1"

  # DB
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-nl_lib}
  DB_USER: ${POSTGRES_USER:-admin}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-password}

  # Redis
  REDIS_URL: "redis://redis:6379/0"

  # MinIO
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_SECURE: "false"
  MINIO_BUCKET: "nl-lib-bucket"

  # Milvus
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION: "nl_lib_embeddings"

  # VLM (멀티모달 OCR — 같은 스택 vllm 컨테이너 / Qwen2.5-VL)
  VLM_BASE_URL: ${VLM_BASE_URL:-http://vllm:8000/v1}
  VLM_MODEL: ${VLM_MODEL:-qwen3-vl-8b}

  # LLM (텍스트 생성 — 외부 스택 / Gemma 3 12B, host.docker.internal 경유)
  LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:18080/v1}
  LLM_MODEL: ${LLM_MODEL:-gemma-3-12b}
  LLM_TIMEOUT: "30"

  # FLUX (자동 표지 이미지 생성 — black-forest-labs/FLUX.1-dev)
  FLUX_BASE_URL: ${FLUX_BASE_URL:-http://flux:8000}
  FLUX_TIMEOUT: "300"

  # PaddleOCR
  PADDLEOCR_URL: "http://paddleocr:8001"

  # 임베딩 / Reranker
  EMBEDDING_MODEL_NAME: "BAAI/bge-m3"
  EMBEDDING_BATCH_SIZE: "32"
  EMBEDDING_MAX_LENGTH: "512"
  EMBEDDING_DIM: "1024"
  RERANKER_MODEL_NAME: "jinaai/jina-reranker-v2-base-multilingual"
  RERANKER_BATCH_SIZE: "16"
  RERANKER_MAX_LENGTH: "1024"

services:
  # ── etcd ──────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: nl-lib-etcd
    environment:
      ETCD_DATA_DIR: "/etcd"
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      ETCD_ENABLE_V2: "true"
      ETCD_LOG_LEVEL: "info"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd:2380"
      ETCD_INITIAL_CLUSTER: "default=http://etcd:2380"
      ETCD_NAME: "default"
      ETCDCTL_API: "3"
    volumes:
      - nl_lib_etcd_data:/etcd
    <<: *nl-lib-net
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "health",
          "--endpoints=http://127.0.0.1:2379",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── MinIO ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nl-lib-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - nl_lib_minio_data:/data
    ports:
      - "21000:9000"
      - "21001:9001"
    <<: *nl-lib-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: nl-lib-minio-init
    <<: *nl-lib-net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: "nl-lib-bucket"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb -p myminio/$${MINIO_BUCKET} || true &&
      echo '[minio-init] bucket ready:' $${MINIO_BUCKET}
      "
    restart: "no"

  # ── Milvus ────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: nl-lib-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "nl-lib-bucket"
    volumes:
      - nl_lib_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    <<: *nl-lib-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nl-lib-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nl_lib}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "15432:5432"
    volumes:
      - nl_lib_postgres_data:/var/lib/postgresql/data
    <<: *nl-lib-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-nl_lib}",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nl-lib-redis
    ports:
      - "16379:6379"
    volumes:
      - nl_lib_redis_data:/data
    <<: *nl-lib-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── vLLM (Gemma 4 E4B) ──────────────────────
  vllm:
    # image: landsoftdocker/nl-lib-vllm:latest
    image: vllm/vllm-openai:latest-cu130
    container_name: nl-lib-vllm
    <<: *nl-lib-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "16g"
    environment:
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_TOKEN}
      HF_TOKEN: ${HUGGINGFACE_TOKEN}
      HF_HOME: "/models"
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      VLLM_WORKER_MULTIPROC_METHOD: "spawn"
    volumes:
      - /data/models/.hf-cache:/models:rw
    command:
      - Qwen/Qwen3-VL-8B-Instruct
      - --served-model-name
      - qwen3-vl-8b
      - --download-dir
      - /models
      - --max-model-len
      - "32768"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.3"
      - --max-num-seqs
      - "8"
      # - --enforce-eager
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    ports:
      - "18081:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 600s
    restart: unless-stopped

  # ── FLUX.1-dev (표지 자동 생성) ──────────────
  flux:
    image: landsoftdocker/nl-lib-flux:latest
    container_name: nl-lib-flux
    <<: *nl-lib-net
    shm_size: "8g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_TOKEN}
      HF_TOKEN: ${HUGGINGFACE_TOKEN}
      HF_HOME: "/models"
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      FLUX_MODEL_ID: ${FLUX_MODEL_ID:-black-forest-labs/FLUX.1-dev}
      FLUX_DTYPE: "bfloat16"
      FLUX_CPU_OFFLOAD: "false"
      FLUX_LORA_ID: ${FLUX_LORA_ID:-prithivMLmods/EBook-Creative-Cover-Flux-LoRA}
      FLUX_LORA_SCALE: ${FLUX_LORA_SCALE:-0.85}
      FLUX_LORA_TRIGGER: ${FLUX_LORA_TRIGGER:-BOOK}
    volumes:
      - /data/models/.hf-cache:/models:rw
    ports:
      - "18090:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 600s
    restart: unless-stopped

  # ── PaddleOCR (GPU) ──────────────────────────
  # paddleocr:
  #   image: landsoftdocker/clms-paddleocr:latest
  #   container_name: nl-lib-paddleocr
  #   <<: *nl-lib-net
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   environment:
  #     NVIDIA_VISIBLE_DEVICES: all
  #     NVIDIA_DRIVER_CAPABILITIES: compute,utility
  #   ports:
  #     - "18003:8001"
  #   healthcheck:
  #     test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 60s
  #   restart: unless-stopped

  # ── FastAPI ───────────────────────────────────
  fastapi:
    image: landsoftdocker/nl-lib-fastapi:latest
    container_name: nl-lib-fastapi
    <<: *nl-lib-net
    shm_size: "4g"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/data:/app/data:rw
    ports:
      - "18002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      # paddleocr:
      #   condition: service_healthy
      vllm:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ── Celery Worker (단건 흐름 — ingestion 큐, GPU: BGE-M3 인라인 임베딩) ──
  celery-worker:
    image: landsoftdocker/nl-lib-fastapi:latest
    container_name: nl-lib-celery
    <<: *nl-lib-net
    shm_size: "4g"
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q ingestion,default
    environment:
      <<: *common-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/data:/app/data:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery CPU Worker (배치 잡: 추출/파싱 — GPU 불필요, VLM은 HTTP) ──
  celery-cpu:
    image: landsoftdocker/nl-lib-fastapi:latest
    container_name: nl-lib-celery-cpu
    <<: *nl-lib-net
    shm_size: "4g"
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q q_cpu,q_control --max-tasks-per-child=50
    environment:
      <<: *common-env
      PYTHONPATH: /app
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/data:/app/data:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery LLM Worker (배치 잡: 섹션 요약·문서 요약/소개 — 외부 vLLM HTTP) ──
  # 글로벌 동시 LLM = concurrency(4) × LLM_SECTION_CONCURRENCY(4) ≤ vLLM max-num-seqs(16)
  celery-llm:
    image: landsoftdocker/nl-lib-fastapi:latest
    container_name: nl-lib-celery-llm
    <<: *nl-lib-net
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q q_llm --max-tasks-per-child=200
    environment:
      <<: *common-env
      PYTHONPATH: /app
    volumes:
      - /data/nl-lib/data:/app/data:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Embed Worker (배치 잡: 청킹+BGE-M3 임베딩+Milvus — GPU) ──
  # 모델은 프로세스당 1회 로드 — concurrency=1 유지, 배치 크기로 처리량 확보
  celery-embed:
    image: landsoftdocker/nl-lib-fastapi:latest
    container_name: nl-lib-celery-embed
    <<: *nl-lib-net
    shm_size: "4g"
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1 -Q q_embed
    environment:
      <<: *common-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/data:/app/data:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (디스패처 30s + 정리 1h 스케줄러) ──
  celery-beat:
    image: landsoftdocker/nl-lib-fastapi:latest
    container_name: nl-lib-celery-beat
    <<: *nl-lib-net
    working_dir: /app
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      <<: *common-env
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Nuxt ──────────────────────────────────────
  nuxt:
    image: landsoftdocker/nl-lib-nuxt:latest
    container_name: nl-lib-nuxt
    <<: *nl-lib-net
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      PORT: "3000"
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Nginx Gateway ─────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: nl-lib-gateway
    <<: *nl-lib-net
    volumes:
      - /data/nl-lib/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/nl-lib/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "92:80"
    depends_on:
      nuxt:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  nl_lib_etcd_data:
    external: true
    name: nl_lib_etcd_data
  nl_lib_milvus_data:
    external: true
    name: nl_lib_milvus_data
  nl_lib_minio_data:
    external: true
    name: nl_lib_minio_data
  nl_lib_postgres_data:
    external: true
    name: nl_lib_postgres_data
  nl_lib_redis_data:
    external: true
    name: nl_lib_redis_data

networks:
  nl-lib-net:
    external: true
    name: nl-lib-net
