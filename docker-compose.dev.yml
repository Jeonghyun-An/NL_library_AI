# 개발용 스택. 운영(docker-compose.yml)과 데이터 계층(postgres/redis/milvus/
# minio)은 완전히 분리하고, GPU를 크게 먹는 vllm/gemma/flux는 운영 스택
# 컨테이너를 nl-lib-net 경유로 그대로 공유한다 (여기서는 띄우지 않음).
x-nl-lib-dev-net: &nl-lib-dev-net
  networks:
    - nl-lib-dev-net

# 운영 LLM/VLM/FLUX(nl-lib-net)와 개발 데이터 계층(nl-lib-dev-net) 양쪽에
# 붙어야 하는 백엔드 서비스용
x-nl-lib-dev-net-and-prod: &nl-lib-dev-net-and-prod
  networks:
    - nl-lib-dev-net
    - nl-lib-net

x-common-env-dev: &common-env-dev
  IS_DOCKER: "true"
  PYTHONUNBUFFERED: "1"

  # DB
  DB_HOST: "postgres-dev"
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB_DEV:-nl_lib_dev}
  DB_USER: ${POSTGRES_USER_DEV:-admin}
  DB_PASSWORD: ${POSTGRES_PASSWORD_DEV:-password}

  # Redis
  REDIS_URL: "redis://redis-dev:6379/0"

  # MinIO
  MINIO_ENDPOINT: "minio-dev:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY_DEV:-minioadmin}
  MINIO_SECURE: "false"
  MINIO_BUCKET: "nl-lib-dev-bucket"

  # Milvus
  MILVUS_HOST: "milvus-dev"
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION: "nl_lib_dev_embeddings"
  MILVUS_RECREATE_ON_MISMATCH: ${MILVUS_RECREATE_ON_MISMATCH_DEV:-false}
  MILVUS_INDEX_TYPE: ${MILVUS_INDEX_TYPE:-IVF_FLAT}
  MILVUS_NLIST: ${MILVUS_NLIST:-256}
  MILVUS_NPROBE: ${MILVUS_NPROBE:-32}

  # VLM / LLM / FLUX — 운영 스택 컨테이너를 nl-lib-net 경유로 그대로 공유
  VLM_BASE_URL: "http://nl-lib-vllm:8000/v1"
  VLM_MODEL: "qwen3-vl-8b"
  LLM_BASE_URL: "http://nl-lib-gemma:8000/v1"
  LLM_MODEL: "gemma-3-12b"
  LLM_TIMEOUT: "120"
  LLM_SECTION_CONCURRENCY: "4"
  FLUX_BASE_URL: "http://nl-lib-flux:8000"
  FLUX_TIMEOUT: "300"

  # PaddleOCR
  PADDLEOCR_URL: "http://paddleocr:8001"

  # 임베딩 / Reranker
  EMBEDDING_MODEL_NAME: "BAAI/bge-m3"
  EMBEDDING_BATCH_SIZE: "32"
  EMBEDDING_MAX_LENGTH: "512"
  EMBEDDING_DIM: "1024"
  RERANKER_MODEL_NAME: "jinaai/jina-reranker-v2-base-multilingual"
  RERANKER_BATCH_SIZE: "16"
  RERANKER_MAX_LENGTH: "1024"

services:
  # ── etcd ──────────────────────────────────────
  etcd-dev:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: nl-lib-dev-etcd
    environment:
      ETCD_DATA_DIR: "/etcd"
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      ETCD_ENABLE_V2: "true"
      ETCD_LOG_LEVEL: "info"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd-dev:2379"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd-dev:2380"
      ETCD_INITIAL_CLUSTER: "default=http://etcd-dev:2380"
      ETCD_NAME: "default"
      ETCDCTL_API: "3"
    volumes:
      - nl_lib_dev_etcd_data:/etcd
    <<: *nl-lib-dev-net
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "health",
          "--endpoints=http://127.0.0.1:2379",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── MinIO ─────────────────────────────────────
  minio-dev:
    image: minio/minio:latest
    container_name: nl-lib-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY_DEV:-minioadmin}
    volumes:
      - nl_lib_dev_minio_data:/data
    ports:
      - "31000:9000"
      - "31001:9001"
    <<: *nl-lib-dev-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  minio-init-dev:
    image: minio/mc:latest
    container_name: nl-lib-dev-minio-init
    <<: *nl-lib-dev-net
    depends_on:
      minio-dev:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY_DEV:-minioadmin}
      MINIO_BUCKET: "nl-lib-dev-bucket"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set myminio http://minio-dev:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb -p myminio/$${MINIO_BUCKET} || true &&
      echo '[minio-init-dev] bucket ready:' $${MINIO_BUCKET}
      "
    restart: "no"

  # ── Milvus ────────────────────────────────────
  milvus-dev:
    image: milvusdb/milvus:v2.4.6
    container_name: nl-lib-dev-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "etcd-dev:2379"
      MINIO_ADDRESS: "minio-dev:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY_DEV:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "nl-lib-dev-bucket"
    volumes:
      - nl_lib_dev_milvus_data:/var/lib/milvus
    depends_on:
      etcd-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      minio-init-dev:
        condition: service_completed_successfully
    <<: *nl-lib-dev-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────
  postgres-dev:
    image: postgres:16-alpine
    container_name: nl-lib-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB_DEV:-nl_lib_dev}
      POSTGRES_USER: ${POSTGRES_USER_DEV:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_DEV:-password}
    ports:
      - "25432:5432"
    volumes:
      - nl_lib_dev_postgres_data:/var/lib/postgresql/data
    <<: *nl-lib-dev-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER_DEV:-admin} -d ${POSTGRES_DB_DEV:-nl_lib_dev}",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────
  redis-dev:
    image: redis:7-alpine
    container_name: nl-lib-dev-redis
    ports:
      - "26379:6379"
    volumes:
      - nl_lib_dev_redis_data:/data
    <<: *nl-lib-dev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── FastAPI ───────────────────────────────────
  fastapi-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-fastapi
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    environment:
      <<: *common-env-dev
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    ports:
      - "28002:8000"
    depends_on:
      postgres-dev:
        condition: service_healthy
      milvus-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ── Celery Worker (단건 흐름 — ingestion 큐, GPU: BGE-M3 인라인 임베딩) ──
  celery-worker-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q ingestion,default
    environment:
      <<: *common-env-dev
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      milvus-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery CPU Worker (배치 잡: 추출/파싱 — GPU 불필요, VLM은 HTTP) ──
  celery-cpu-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-cpu
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q q_cpu,q_control --max-tasks-per-child=50
    environment:
      <<: *common-env-dev
      PYTHONPATH: /app
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery LLM Worker (배치 잡: 섹션 요약·문서 요약/소개 — 공유 gemma HTTP) ──
  celery-llm-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-llm
    <<: *nl-lib-dev-net-and-prod
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q q_llm --max-tasks-per-child=200
    environment:
      <<: *common-env-dev
      PYTHONPATH: /app
    volumes:
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Embed Worker (배치 잡: 청킹+BGE-M3 임베딩+Milvus — GPU) ──
  celery-embed-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-embed
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1 -Q q_embed
    environment:
      <<: *common-env-dev
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      milvus-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (디스패처 30s + 정리 1h 스케줄러) ──
  celery-beat-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-beat
    <<: *nl-lib-dev-net
    working_dir: /app
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      <<: *common-env-dev
      PYTHONPATH: /app
    depends_on:
      redis-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Nuxt ──────────────────────────────────────
  nuxt-dev:
    image: landsoftdocker/nl-lib-nuxt:dev
    container_name: nl-lib-dev-nuxt
    <<: *nl-lib-dev-net
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      PORT: "3000"
    depends_on:
      fastapi-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Nginx Gateway ─────────────────────────────
  gateway-dev:
    image: nginx:alpine
    container_name: nl-lib-dev-gateway
    <<: *nl-lib-dev-net
    volumes:
      - /data/nl-lib/nginx-dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/nl-lib/nginx-dev/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "10092:80"
    depends_on:
      nuxt-dev:
        condition: service_healthy
      fastapi-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  nl_lib_dev_etcd_data:
    external: true
    name: nl_lib_dev_etcd_data
  nl_lib_dev_milvus_data:
    external: true
    name: nl_lib_dev_milvus_data
  nl_lib_dev_minio_data:
    external: true
    name: nl_lib_dev_minio_data
  nl_lib_dev_postgres_data:
    external: true
    name: nl_lib_dev_postgres_data
  nl_lib_dev_redis_data:
    external: true
    name: nl_lib_dev_redis_data

networks:
  nl-lib-dev-net:
    name: nl-lib-dev-net
  # 운영 스택이 먼저 떠 있어야 하는 외부 네트워크 (vllm/gemma/flux 공유용)
  nl-lib-net:
    external: true
    name: nl-lib-net
