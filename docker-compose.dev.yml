# 개발용 스택. 운영(docker-compose.yml)과 데이터 계층(postgres/redis/milvus/
# minio)은 완전히 분리하고, GPU를 크게 먹는 vllm/gemma/flux는 운영 스택
# 컨테이너를 nl-lib-net 경유로 그대로 공유한다 (여기서는 띄우지 않음).
x-nl-lib-dev-net: &nl-lib-dev-net
  networks:
    - nl-lib-dev-net

# 운영 LLM/VLM/FLUX(nl-lib-net)와 개발 데이터 계층(nl-lib-dev-net) 양쪽에
# 붙어야 하는 백엔드 서비스용
x-nl-lib-dev-net-and-prod: &nl-lib-dev-net-and-prod
  networks:
    - nl-lib-dev-net
    - nl-lib-net

x-common-env-dev: &common-env-dev
  IS_DOCKER: "true"
  PYTHONUNBUFFERED: "1"

  # DB
  DB_HOST: "postgres-dev"
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB_DEV:-nl_lib_dev}
  DB_USER: ${POSTGRES_USER_DEV:-admin}
  DB_PASSWORD: ${POSTGRES_PASSWORD_DEV:-password}

  # Redis
  REDIS_URL: "redis://redis-dev:6379/0"

  # MinIO
  MINIO_ENDPOINT: "minio-dev:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY_DEV:-minioadmin}
  MINIO_SECURE: "false"
  MINIO_BUCKET: "nl-lib-dev-bucket"

  # Milvus
  MILVUS_HOST: "milvus-dev"
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION: "nl_lib_dev_embeddings"
  MILVUS_RECREATE_ON_MISMATCH: ${MILVUS_RECREATE_ON_MISMATCH_DEV:-false}
  MILVUS_INDEX_TYPE: ${MILVUS_INDEX_TYPE:-IVF_FLAT}
  MILVUS_NLIST: ${MILVUS_NLIST:-256}
  MILVUS_NPROBE: ${MILVUS_NPROBE:-32}

  # VLM / LLM / FLUX — 운영 스택 컨테이너를 nl-lib-net 경유로 그대로 공유
  VLM_BASE_URL: "http://nl-lib-vllm:8000/v1"
  VLM_MODEL: "qwen3-vl-8b"
  LLM_BASE_URL: "http://nl-lib-gemma:8000/v1"
  LLM_MODEL: "gemma-3-12b"
  LLM_TIMEOUT: "120"
  LLM_SECTION_CONCURRENCY: "4"
  FLUX_BASE_URL: "http://nl-lib-flux:8000"
  FLUX_TIMEOUT: "300"

  # PaddleOCR
  PADDLEOCR_URL: "http://paddleocr:8001"

  # 임베딩 / Reranker
  EMBEDDING_MODEL_NAME: "BAAI/bge-m3"
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
  EMBEDDING_MAX_LENGTH: "512"
  EMBEDDING_DIM: "1024"
  RERANKER_MODEL_NAME: "jinaai/jina-reranker-v2-base-multilingual"
  RERANKER_BATCH_SIZE: "16"
  RERANKER_MAX_LENGTH: "1024"

  # 도메인 프로파일
  DOMAIN_PROFILE: ${DOMAIN_PROFILE:-nl_library}

  # RAG 검색
  RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-20}
  RERANK_TOP_K: ${RERANK_TOP_K:-5}
  SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.5}
  CHUNK_MODE_FETCH_MULTIPLIER: ${CHUNK_MODE_FETCH_MULTIPLIER:-4}
  BOOK_MODE_FETCH_MULTIPLIER: ${BOOK_MODE_FETCH_MULTIPLIER:-3}
  BOOK_MODE_FETCH_MULTIPLIER_SORT: ${BOOK_MODE_FETCH_MULTIPLIER_SORT:-4}
  HYBRID_SEARCH_CHUNK_LIMIT_MULT: ${HYBRID_SEARCH_CHUNK_LIMIT_MULT:-10}
  MARC_KEYWORDS_LIMIT: ${MARC_KEYWORDS_LIMIT:-5}
  KEYWORDS_MAX_COUNT: ${KEYWORDS_MAX_COUNT:-5}

  # Milvus sparse / RRF
  MILVUS_SPARSE_DROP_RATIO_BUILD: ${MILVUS_SPARSE_DROP_RATIO_BUILD:-0.2}
  MILVUS_SPARSE_DROP_RATIO_SEARCH: ${MILVUS_SPARSE_DROP_RATIO_SEARCH:-0.2}
  RRF_RANKER_K: ${RRF_RANKER_K:-60}

  # 컨텍스트 확장
  CONTEXT_BUDGET_TOKENS: ${CONTEXT_BUDGET_TOKENS:-100000}
  EXPAND_SECTIONS: ${EXPAND_SECTIONS:-2}

  # 추천 이유 / 답변 생성 LLM
  REASON_CHUNKS_DISPLAY_LIMIT: ${REASON_CHUNKS_DISPLAY_LIMIT:-15}
  REASON_MAX_TOKENS: ${REASON_MAX_TOKENS:-650}
  REASON_TEMPERATURE: ${REASON_TEMPERATURE:-0.4}
  REASON_TIMEOUT: ${REASON_TIMEOUT:-60}
  RECOMMENDATION_MAX_TOKENS: ${RECOMMENDATION_MAX_TOKENS:-1500}

  # 큐레이션 리포트 LLM
  CURATION_TOP_K: ${CURATION_TOP_K:-20}
  CURATION_MAX_TOKENS: ${CURATION_MAX_TOKENS:-1200}
  CURATION_TEMPERATURE: ${CURATION_TEMPERATURE:-0.3}
  CURATION_TIMEOUT: ${CURATION_TIMEOUT:-60}
  ANSWER_EXTENDED_MAX_TOKENS: ${ANSWER_EXTENDED_MAX_TOKENS:-4096}
  ANSWER_EXTENDED_TEMPERATURE: ${ANSWER_EXTENDED_TEMPERATURE:-0.3}
  ANSWER_EXTENDED_TIMEOUT: ${ANSWER_EXTENDED_TIMEOUT:-120}
  ANSWER_BASE_CHUNKS_LIMIT: ${ANSWER_BASE_CHUNKS_LIMIT:-5}
  ANSWER_BASE_MAX_TOKENS: ${ANSWER_BASE_MAX_TOKENS:-2048}
  ANSWER_BASE_TEMPERATURE: ${ANSWER_BASE_TEMPERATURE:-0.3}
  ANSWER_BASE_TIMEOUT: ${ANSWER_BASE_TIMEOUT:-60}

  # 도서 대화 (book_chat)
  BOOK_CHAT_SEARCH_TOP_K: ${BOOK_CHAT_SEARCH_TOP_K:-6}
  BOOK_CHAT_HISTORY_MESSAGES: ${BOOK_CHAT_HISTORY_MESSAGES:-20}
  BOOK_CHAT_TIMEOUT: ${BOOK_CHAT_TIMEOUT:-90}
  BOOK_CHAT_QUERY_REWRITE: ${BOOK_CHAT_QUERY_REWRITE:-true}
  BOOK_CHAT_QUERY_REWRITE_HISTORY: ${BOOK_CHAT_QUERY_REWRITE_HISTORY:-6}
  BOOK_CHAT_QUERY_REWRITE_TIMEOUT: ${BOOK_CHAT_QUERY_REWRITE_TIMEOUT:-20}

  # 쿼리 전처리 LLM 타임아웃(초)
  QUERY_REWRITE_TIMEOUT: ${QUERY_REWRITE_TIMEOUT:-30}
  METADATA_FILTER_TIMEOUT: ${METADATA_FILTER_TIMEOUT:-15}

  # 논문 핵심 요약 (paper_summary)
  PAPER_SUMMARY_TIMEOUT: ${PAPER_SUMMARY_TIMEOUT:-120}
  PAPER_SUMMARY_TOP_K: ${PAPER_SUMMARY_TOP_K:-5}

  # 논문 보강 (paper_enricher)
  PAPER_ENRICH_ENABLED: ${PAPER_ENRICH_ENABLED:-true}
  PAPER_MAX_TABLES_PER_DOC: ${PAPER_MAX_TABLES_PER_DOC:-10}
  PAPER_MAX_FIGURES_PER_DOC: ${PAPER_MAX_FIGURES_PER_DOC:-8}
  PAPER_TABLE_INTERP_TIMEOUT: ${PAPER_TABLE_INTERP_TIMEOUT:-60}
  PAPER_FIGURE_VLM_TIMEOUT: ${PAPER_FIGURE_VLM_TIMEOUT:-90}

  # 시맨틱 청킹
  MIN_CHUNK_TOKENS: ${MIN_CHUNK_TOKENS:-128}
  MAX_CHUNK_TOKENS: ${MAX_CHUNK_TOKENS:-1024}
  MAX_CHUNK_BYTES: ${MAX_CHUNK_BYTES:-15500}
  SIMILARITY_WINDOW: ${SIMILARITY_WINDOW:-3}
  BREAKPOINT_PERCENTILE: ${BREAKPOINT_PERCENTILE:-25}

  # 섹션 분할 / 다운로드
  SECTION_TARGET_TOKENS: ${SECTION_TARGET_TOKENS:-3000}
  SECTION_MAX_TOKENS: ${SECTION_MAX_TOKENS:-5000}
  DOWNLOAD_DIR: "/app/data/downloads"

  # 텍스트 추출 / VLM OCR
  EXTRACT_MIN_CHARS_PER_PAGE: ${EXTRACT_MIN_CHARS_PER_PAGE:-50}
  FITZ_DPI: ${FITZ_DPI:-300}
  VLM_MAX_TOKENS: ${VLM_MAX_TOKENS:-4096}
  VLM_TEMPERATURE: ${VLM_TEMPERATURE:-0.1}
  VLM_TIMEOUT: ${VLM_TIMEOUT:-120}

  # PDF 메타 자동추출
  PDF_META_MAX_CHARS: ${PDF_META_MAX_CHARS:-3000}
  PDF_META_MAX_TOKENS: ${PDF_META_MAX_TOKENS:-1024}
  PDF_META_TEMPERATURE: ${PDF_META_TEMPERATURE:-0.1}
  PDF_META_TIMEOUT: ${PDF_META_TIMEOUT:-60}

  # 요약 LLM 타임아웃(초)
  SUMMARIZER_SECTION_TIMEOUT: ${SUMMARIZER_SECTION_TIMEOUT:-60}
  SUMMARIZER_BOOK_TIMEOUT: ${SUMMARIZER_BOOK_TIMEOUT:-120}
  SUMMARIZER_INTRO_TIMEOUT: ${SUMMARIZER_INTRO_TIMEOUT:-120}
  SUMMARIZER_PLOT_TIMEOUT: ${SUMMARIZER_PLOT_TIMEOUT:-120}
  SUMMARIZER_READ_EFFECT_TIMEOUT: ${SUMMARIZER_READ_EFFECT_TIMEOUT:-120}
  SUMMARIZER_MAX_INPUT_CHARS: ${SUMMARIZER_MAX_INPUT_CHARS:-14000}

  # FLUX 표지 생성
  FLUX_WIDTH: ${FLUX_WIDTH:-768}
  FLUX_HEIGHT: ${FLUX_HEIGHT:-1152}
  FLUX_STEPS: ${FLUX_STEPS:-28}
  FLUX_GUIDANCE: ${FLUX_GUIDANCE:-3.5}
  COVER_PROMPT_TIMEOUT: ${COVER_PROMPT_TIMEOUT:-60}

  # 대량 인덱싱 잡 / 배치 / 락
  INGEST_HIGH_WATER: ${INGEST_HIGH_WATER:-32}
  INGEST_MAX_ATTEMPTS: ${INGEST_MAX_ATTEMPTS:-3}
  INGEST_STAGE_TIMEOUT_EXTRACT: ${INGEST_STAGE_TIMEOUT_EXTRACT:-1800}
  INGEST_STAGE_TIMEOUT_SUMMARIZE: ${INGEST_STAGE_TIMEOUT_SUMMARIZE:-1200}
  INGEST_STAGE_TIMEOUT_EMBED: ${INGEST_STAGE_TIMEOUT_EMBED:-1200}
  INGEST_STAGE_TIMEOUT_FINALIZE: ${INGEST_STAGE_TIMEOUT_FINALIZE:-900}
  DISPATCH_STALE_SECONDS: ${DISPATCH_STALE_SECONDS:-14400}
  JOB_MANAGER_CHUNK_SIZE: ${JOB_MANAGER_CHUNK_SIZE:-5000}
  JOB_MANAGER_BATCH_SIZE: ${JOB_MANAGER_BATCH_SIZE:-1000}
  CATALOG_BULK_BATCH_SIZE: ${CATALOG_BULK_BATCH_SIZE:-1000}
  BOOK_LOCK_TTL: ${BOOK_LOCK_TTL:-3600}

services:
  # ── etcd ──────────────────────────────────────
  etcd-dev:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: nl-lib-dev-etcd
    environment:
      ETCD_DATA_DIR: "/etcd"
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      ETCD_ENABLE_V2: "true"
      ETCD_LOG_LEVEL: "info"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd-dev:2379"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd-dev:2380"
      ETCD_INITIAL_CLUSTER: "default=http://etcd-dev:2380"
      ETCD_NAME: "default"
      ETCDCTL_API: "3"
    volumes:
      - nl_lib_dev_etcd_data:/etcd
    <<: *nl-lib-dev-net
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "health",
          "--endpoints=http://127.0.0.1:2379",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── MinIO ─────────────────────────────────────
  minio-dev:
    image: minio/minio:latest
    container_name: nl-lib-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY_DEV:-minioadmin}
    volumes:
      - nl_lib_dev_minio_data:/data
    ports:
      - "31000:9000"
      - "31001:9001"
    <<: *nl-lib-dev-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  minio-init-dev:
    image: minio/mc:latest
    container_name: nl-lib-dev-minio-init
    <<: *nl-lib-dev-net
    depends_on:
      minio-dev:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY_DEV:-minioadmin}
      MINIO_BUCKET: "nl-lib-dev-bucket"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set myminio http://minio-dev:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb -p myminio/$${MINIO_BUCKET} || true &&
      echo '[minio-init-dev] bucket ready:' $${MINIO_BUCKET}
      "
    restart: "no"

  # ── Milvus ────────────────────────────────────
  milvus-dev:
    image: milvusdb/milvus:v2.4.6
    container_name: nl-lib-dev-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "etcd-dev:2379"
      MINIO_ADDRESS: "minio-dev:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY_DEV:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY_DEV:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "nl-lib-dev-bucket"
    volumes:
      - nl_lib_dev_milvus_data:/var/lib/milvus
    depends_on:
      etcd-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      minio-init-dev:
        condition: service_completed_successfully
    <<: *nl-lib-dev-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────
  postgres-dev:
    image: postgres:16-alpine
    container_name: nl-lib-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB_DEV:-nl_lib_dev}
      POSTGRES_USER: ${POSTGRES_USER_DEV:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_DEV:-password}
    ports:
      - "25432:5432"
    volumes:
      - nl_lib_dev_postgres_data:/var/lib/postgresql/data
    <<: *nl-lib-dev-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER_DEV:-admin} -d ${POSTGRES_DB_DEV:-nl_lib_dev}",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────
  redis-dev:
    image: redis:7-alpine
    container_name: nl-lib-dev-redis
    ports:
      - "26379:6379"
    volumes:
      - nl_lib_dev_redis_data:/data
    <<: *nl-lib-dev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── FastAPI ───────────────────────────────────
  fastapi-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-fastapi
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    environment:
      <<: *common-env-dev
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    ports:
      - "28002:8000"
    depends_on:
      postgres-dev:
        condition: service_healthy
      milvus-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ── Celery Worker (단건 흐름 — ingestion 큐, GPU: BGE-M3 인라인 임베딩) ──
  celery-worker-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q ingestion,default
    environment:
      <<: *common-env-dev
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      milvus-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery CPU Worker (배치 잡: 추출/파싱 — GPU 불필요, VLM은 HTTP) ──
  celery-cpu-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-cpu
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q q_cpu,q_control --max-tasks-per-child=50
    environment:
      <<: *common-env-dev
      PYTHONPATH: /app
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery LLM Worker (배치 잡: 섹션 요약·문서 요약/소개 — 공유 gemma HTTP) ──
  celery-llm-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-llm
    <<: *nl-lib-dev-net-and-prod
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q q_llm --max-tasks-per-child=200
    environment:
      <<: *common-env-dev
      PYTHONPATH: /app
    volumes:
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Embed Worker (배치 잡: 청킹+BGE-M3 임베딩+Milvus — GPU) ──
  celery-embed-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-embed
    <<: *nl-lib-dev-net-and-prod
    shm_size: "4g"
    working_dir: /app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1 -Q q_embed
    environment:
      <<: *common-env-dev
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data/models/.hf-cache:/models:rw
      - /data/nl-lib/dev-data:/app/data:rw
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      milvus-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (디스패처 30s + 정리 1h 스케줄러) ──
  celery-beat-dev:
    image: landsoftdocker/nl-lib-fastapi:dev
    container_name: nl-lib-dev-celery-beat
    <<: *nl-lib-dev-net
    working_dir: /app
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      <<: *common-env-dev
      PYTHONPATH: /app
    depends_on:
      redis-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── Nuxt ──────────────────────────────────────
  nuxt-dev:
    image: landsoftdocker/nl-lib-nuxt:dev
    container_name: nl-lib-dev-nuxt
    <<: *nl-lib-dev-net
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      PORT: "3000"
    depends_on:
      fastapi-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Nginx Gateway ─────────────────────────────
  gateway-dev:
    image: nginx:alpine
    container_name: nl-lib-dev-gateway
    <<: *nl-lib-dev-net
    volumes:
      - /data/nl-lib/nginx-dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/nl-lib/nginx-dev/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "10092:80"
    depends_on:
      nuxt-dev:
        condition: service_healthy
      fastapi-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
