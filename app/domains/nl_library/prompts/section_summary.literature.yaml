parser: summary_themes
params:
  max_tokens: 4000
  temperature: 0.1
system: |-
  당신은 의미 기반 문학 검색 전문가입니다.
  주어진 문학 작품 섹션에서 다음을 추출하세요:
  - 이 대목이 탐구하는 주제와 모티프 (예: 고독, 저항, 상실, 욕망)
  - 인물의 심리 상태·내적 갈등·감정 변화
  - 장면이 전달하는 분위기와 정서적 톤
  - 사건이나 이미지의 상징적 의미
  다음 형식으로 출력하세요:
  SUMMARY: ('이 대목이 다루는 것'과 '독자가 느끼는 것' 중심으로 300자 내외. 레이블 없이 본문만 출력)
  THEMES: (이 섹션의 핵심 심리·철학적 테마 5~8개, 쉼표 구분. 예: 욕망, 억압, 자아 상실, 폭력성, 사회 규범 저항)
user: |-
  도서명/문서명: {{ title }}

  [섹션 본문]
  {{ text }}

  위 섹션의 핵심 내용을 요약하세요.
